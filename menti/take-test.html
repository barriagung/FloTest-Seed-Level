<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FloTest - Kerjakan Tes</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div>
        <h1>Kerjakan Tes</h1>
      </div>
      <nav aria-label="Navigasi kerjakan tes">
        <a href="dashboard.html">Dashboard</a>
        <a class="logout" href="../index.html">Logout</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="progress-section">
      <div class="progress-info">
        <span>HTML Basic - Soal 1 dari 10</span>
        <span>10%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: 10%;"></div>
      </div>
    </section>

    <section class="card">
      <h2>Pertanyaan 1</h2>
      <p>Apa yang dimaksud dengan tag HTML?</p>

      <form action="result.html" method="post">
        <div>
          <p>Pilih jawaban yang benar:</p>
          <div class="answer-option">
            <input type="radio" id="option-a" name="answer" value="A" required>
            <label for="option-a">A. Instruksi untuk browser tentang cara menampilkan konten</label>
          </div>

          <div class="answer-option">
            <input type="radio" id="option-b" name="answer" value="B">
            <label for="option-b">B. Bahasa pemrograman untuk membuat aplikasi</label>
          </div>

          <div class="answer-option">
            <input type="radio" id="option-c" name="answer" value="C">
            <label for="option-c">C. Format untuk menyimpan file di komputer</label>
          </div>

          <div class="answer-option">
            <input type="radio" id="option-d" name="answer" value="D">
            <label for="option-d">D. Protokol untuk mengirim data di internet</label>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="button secondary" disabled>Sebelumnya</button>
          <button type="button" class="button">Selanjutnya</button>
          <button type="submit" class="button">Submit Jawaban</button>
        </div>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>FloTest &copy; 2026</p>
  </footer>
</body>
</html>

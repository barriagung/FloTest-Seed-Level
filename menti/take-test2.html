<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FloTest - Kerjakan Tes</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <div>
          <h1>Kerjakan Tes</h1>
        </div>
        <nav aria-label="Navigasi kerjakan tes">
          <a href="dashboard.html">Dashboard</a>
          <a class="logout" href="../index.html">Logout</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="progress-section">
        <div class="progress-info">
          <span>Pemrograman Dasar - Soal 1 dari 10</span>
          <span>40%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width: 40%"></div>
        </div>
      </section>

      <section class="card">
        <h2>Pertanyaan 3</h2>
        <p>Apa fungsi dari percabangan (if-else) dalam pemrograman?</p>

        <form action="take-test3.html" method="post">
          <div>
            <p>Pilih jawaban yang benar:</p>
            <div class="answer-option">
              <input
                type="radio"
                id="option-a"
                name="answer"
                value="A"
                required
              />
              <label for="option-a">A. Mengulang Program</label>
            </div>

            <div class="answer-option">
              <input type="radio" id="option-b" name="answer" value="B" />
              <label for="option-b">B. Menyimpan Data</label>
            </div>

            <div class="answer-option">
              <input type="radio" id="option-c" name="answer" value="c" />
              <label for="option-c">C. Mengambil keputusan berdasarkan kondisi</label>
            </div>

            <div class="answer-option">
              <input type="radio" id="option-d" name="answer" value="d" />
              <label for="option-d">D. Menghapus variabel</label>
            </div>
          </div>

          <div class="form-actions">
            <a href="take-test1.html" class="button secondary">Sebelumnya</a>
            <button type="submit" class="button">Submit</button>
          </div>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <p>FloTest &copy; 2026</p>
    </footer>
  </body>
</html>

<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FloTest - Edit Question</title>
    <link rel="stylesheet" href="../../../assets/css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <h1>Edit Question</h1>
        <nav aria-label="Navigasi admin">
          <a class="button" href="./index.html">Questions</a>
          <a class="button" href="../index.html">Tests</a>
          <a href="../../dashboard.html">Dashboard</a>
          <a class="logout" href="../../../index.html">Logout</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="card">
        <h2>Edit Question</h2>

          <form action="#" method="post">
          <label for="question-text">Question Text</label>
          <textarea id="question-text" name="question-text" rows="4" required>Apa yang dimaksud dengan variabel dalam pemrograman?</textarea>

          <label for="choice-a">Choice A</label>
          <input
            type="text"
            id="choice-a"
            name="choice-a"
            value="Tempat menyimpan data"
            required
          />

          <label for="choice-b">Choice B</label>
          <input
            type="text"
            id="choice-b"
            name="choice-b"
            value="Perintah untuk mengulang program"
            required
          />

          <label for="choice-c">Choice C</label>
          <input
            type="text"
            id="choice-c"
            name="choice-c"
            value="Fungsi untuk mencetak teks"
            required
          />

          <label for="choice-d">Choice D</label>
          <input
            type="text"
            id="choice-d"
            name="choice-d"
            value="Tipe Data"
            required
          />

           <label for="correct-answer">Correct Answer</label>
          <select id="correct-answer" name="correct-answer" required>
            <option value="">-- Pilih Jawaban Benar --</option>
            <option value="A" selected>A</option>
            <option value="B" >B</option>
            <option value="C">C</option>
            <option value="D">D</option>
          </select>

          <div class="form-actions">
            <button type="submit" class="button">Update</button>
            <a href="index.html" class="button secondary">Cancel</a>
          </div>
        </form>
        
      </section>
    </main>

    <footer class="site-footer">
      <p>FloTest &copy; 2026</p>
    </footer>
  </body>
</html>

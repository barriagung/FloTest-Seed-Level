<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloTest - Create Test</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <h1>Create Test</h1>
            <nav aria-label="Navigasi admin">
                <a href="../dashboard.html">Dashboard</a>
                <a class="logout" href="../../index.html">Logout</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="card">
            <h2>Create Test</h2>

            <form action="#" method="post">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" placeholder="Enter test title" required>

                <label for="description">Description</label>
                <textarea id="description" name="description" rows="5" placeholder="Enter test description"></textarea>

                <label for="mentor">Mentor</label>
                <select id="mentor" name="mentor" required>
                    <option value="">-- Pilih Mentor --</option>
                    <option value="mentor-a">Mentor A</option>
                    <option value="mentor-b">Mentor B</option>
                </select>

                <label for="status">Status</label>
                <select id="status" name="status" required>
                    <option value="draft">Draft</option>
                    <option value="published">Published</option>
                    <option value="archived">Archived</option>
                </select>

                <div class="form-actions">
                    <button type="submit" class="button">Submit</button>
                    <a href="index.html" class="button secondary">Cancel</a>
                </div>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <p>FloTest &copy; 2026</p>
    </footer>
</body>
</html>

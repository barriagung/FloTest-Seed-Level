<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloTest - Tests</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <h1>Tests</h1>
            <nav aria-label="Navigasi admin">

    <main class="container">

            <div class="table-responsive">

                    <thead>

                            <th>Title</th>

                            <th>Questions Count</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>HTML Basic</td>
                            <td>Mentor A</td>
                            <td>Published</td>
                            <td>10</td>
                            <td>
                                <div class="table-actions">
                                    <a class="button secondary" href="questions/index.html">View Questions</a>
                                    <a class="button secondary" href="edit.html">Edit</a>
                                    <button class="btn-delete">Delete</button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td>CSS Basic</td>
                            <td>Mentor B</td>
                            <td>Draft</td>
                            <td>12</td>
                            <td>
                                <div class="table-actions">
                                    <a class="button secondary" href="questions/index.html">View Questions</a>
                                    <a class="button secondary" href="edit.html">Edit</a>
                                    <button class="btn-delete">Delete</button>
                                </div>
                            </td>
                        </tr>
                        <tr>
                            <td>Responsive Design</td>
                            <td>Mentor A</td>
                            <td>Published</td>
                            <td>15</td>
                            <td>
                                <div class="table-actions">
                                    <a class="button secondary" href="questions/index.html">View Questions</a>
                                    <a class="button secondary" href="edit.html">Edit</a>
                                    <button class="btn-delete">Delete</button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
                <div class="form-actions">
                    <button class="button full" type="submit">Submit</button>
                </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>FloTest &copy; 2026</p>
    </footer>
</body>
</html>

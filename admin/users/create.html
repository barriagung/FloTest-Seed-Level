<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloTest - Create User</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <h1>Create User</h1>
            <nav aria-label="Navigasi admin">
                <a href="../dashboard.html">Dashboard</a>
                <a class="logout" href="../../index.html">Logout</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="card">
            <h2>Create User</h2>
            <form action="#" method="post">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Enter user name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="name@example.com" required>

                <label for="role">Role</label>
                <select id="role" name="role" required>
                    <option value="">-- Pilih Role --</option>
                    <option value="admin">Admin</option>
                    <option value="mentor">Mentor</option>
                    <option value="menti">Menti</option>
                </select>

                <div class="form-actions">
                    <button type="submit" class="button">Submit</button>
                    <a href="index.html" class="button secondary">Cancel</a>
                </div>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <p>FloTest &copy; 2026</p>
    </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FloTest - Dashboard Admin</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
  <header class="site-header">
    <div class="container header-inner">
      <h1>Dashboard Admin</h1>
      <nav aria-label="Navigasi admin">
        <a class="logout" href="../index.html">Logout</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="summary-grid">
      <article class="card">
        <h2>Total Users</h2>
        <p class="stat">8</p>
      </article>
      <article class="card">
        <h2>Total Admin</h2>
        <p class="stat">1</p>
      </article>
      <article class="card">
        <h2>Total Mentor</h2>
        <p class="stat">2</p>
      </article>
      <article class="card">
        <h2>Total Menti</h2>
        <p class="stat">5</p>
      </article>
    </section>

    <section class="summary-grid">
      <article class="card">
        <h2>Total Tests</h2>
        <p class="stat">3</p>
      </article>
      <article class="card">
        <h2>Total Questions</h2>
        <p class="stat">33</p>
      </article>
    </section>

    <section class="card content-card">
      <h2>Menu Admin</h2>
      <p>Pilih opsi di bawah ini:</p>
      <div class="button-group">
        <a class="button" href="users/index.html">Users</a>
        <a class="button" href="tests/index.html">Tests</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>FloTest - Admin Dashboard</p>
  </footer>
</body>

</html>

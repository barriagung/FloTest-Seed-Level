<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloTest - Create Question</title>
    <link rel="stylesheet" href="../../../assets/css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <h1>Create Question</h1>
            <nav aria-label="Navigasi admin">
                <a class="button" href="./index1.html">Questions</a>
                <a class="button" href="../index.html">Tests</a>
                <a href="../../dashboard.html">Dashboard</a>
                <a class="logout" href="../../../index.html">Logout</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="card">
            <h2>Create Question</h2>

            <form action="#" method="post">
                <label for="question-text">Question Text</label>
                <textarea id="question-text" name="question-text" rows="4" placeholder="Enter the question text" required></textarea>

                <label for="choice-a">Choice A</label>
                <input type="text" id="choice-a" name="choice-a" placeholder="Enter answer choice A" required>

                <label for="choice-b">Choice B</label>
                <input type="text" id="choice-b" name="choice-b" placeholder="Enter answer choice B" required>

                <label for="choice-c">Choice C</label>
                <input type="text" id="choice-c" name="choice-c" placeholder="Enter answer choice C" required>

                <label for="choice-d">Choice D</label>
                <input type="text" id="choice-d" name="choice-d" placeholder="Enter answer choice D" required>

                <label for="correct-answer">Correct Answer</label>
                <select id="correct-answer" name="correct-answer" required>
                    <option value="">-- Pilih Jawaban Benar --</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                </select>

                <div class="form-actions">
                    <button type="submit" class="button">Submit</button>
                    <a href="index1.html" class="button secondary">Cancel</a>
                </div>
            </form>
        </section>
    </main>

    <footer class="site-footer">
        <p>FloTest &copy; 2026</p>
    </footer>
</body>
</html>

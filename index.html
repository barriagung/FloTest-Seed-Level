<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FloTest - Login</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <h1>FloTest</h1>
      <p>Platform latihan tes HTML & CSS untuk mentor dan menti.</p>
    </div>
  </header>

  <main class="container page-login">
    <section class="card login-card">
      <h2>Login</h2>
      <p>Gunakan akun dummy untuk melihat halaman admin, mentor, dan menti.</p>
      <form action="#" method="post">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="name@example.com" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Masukkan password" required>
      
        <button type="submit">Login</button>
      </form>

      <div class="login-links">
        <p>Login sebagai:</p>
        <a class="button secondary" href="admin/dashboard.html">Admin</a>
        <a class="button secondary" href="mentor/dashboard.html">Mentor</a>
        <a class="button secondary" href="menti/dashboard.html">Menti</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>FloTest &copy; 2026</p>
  </footer>
</body>
</html>
